<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XDownload – Play Store Screenshot Portrait</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,700,1,0" rel="stylesheet" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@600;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #141112;
    font-family: 'Inter', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Background Glows */
  .bg {
    position: absolute; inset: 0; z-index: 0;
    background: 
      radial-gradient(circle at 80% 60%, rgba(255, 140, 0, 0.15) 0%, transparent 60%),
      radial-gradient(circle at 20% 30%, rgba(100, 150, 255, 0.08) 0%, transparent 50%),
      linear-gradient(180deg, #1f1b24 0%, #120e10 100%);
  }

  /* Headline */
  .headline {
    z-index: 1;
    margin-top: 220px;
    font-size: 100px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    color: #fff;
    text-align: center;
    letter-spacing: -1px;
    text-shadow: 
      0 5px 15px rgba(0, 0, 0, 0.9), 
      -20px 25px 50px rgba(0, 0, 0, 0.8),
      20px 25px 50px rgba(0, 0, 0, 0.8),
      0 40px 70px rgba(0, 0, 0, 0.9);
    filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.7));
  }
  .headline span {
    color: #ff8c00;
  }

  /* Phone Mockup */
  .phone-container {
    z-index: 1;
    margin-top: 120px;
    width: 900px;
    height: 1460px;
    border-radius: 60px 60px 0 0;
    background: #000;
    border: 14px solid #282830;
    border-bottom: none;
    box-shadow: 
      0 0 0 4px #3a3a48,
      0 40px 100px rgba(0,0,0,0.9), 
      0 0 80px rgba(255,140,0,0.15);
    position: relative;
    overflow: hidden;
  }

  /* Normal Screen */
  .screen-normal {
    position: absolute;
    inset: 0;
    background: #141414;
    display: flex;
    flex-direction: column;
  }

  /* Browser Chrome */
  .browser-chrome {
    background: #1e1e1e;
    padding: 35px 40px;
    display: flex; align-items: center; gap: 24px;
    border-bottom: 2px solid #2a2a2a;
  }
  .b-home { color: white; font-size: 42px; }
  .b-url {
    flex: 1; background: #2a2a2a;
    border-radius: 40px; padding: 22px 30px;
    color: rgba(255,255,255,0.6); font-size: 26px;
    display: flex; align-items: center; gap: 15px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }

  /* Website Content */
  .site-hdr {
    padding: 40px 40px 24px;
    display: flex; align-items: center;
  }
  .s-logo {
    display: flex; align-items: center; gap: 12px;
  }
  .s-logo-box {
    background: #ff8c00; color: #000;
    font-weight: 900; font-size: 28px;
    padding: 8px 16px; border-radius: 8px;
  }
  .s-logo-txt {
    color: #fff; font-size: 32px; font-weight: 800;
    letter-spacing: 0.5px;
  }

  .vid-area {
    width: 100%;
    height: 500px;
    position: relative;
  }
  .vid-area img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .vid-progress {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 6px; background: rgba(255,255,255,0.3); z-index: 3;
  }
  .vid-progress-fill {
    width: 45%; height: 100%; background: #ff0000;
  }

  .vid-meta {
    padding: 35px 40px;
  }
  .v-title {
    color: #fff; font-size: 36px; font-weight: 700; line-height: 1.4; margin-bottom: 24px;
  }
  .v-stats {
    color: rgba(255,255,255,0.5); font-size: 24px; margin-bottom: 50px;
  }
  .v-actions {
    display: flex; gap: 70px;
  }
  .action-btn {
    display: flex; align-items: center; gap: 16px; color: white;
  }
  .action-btn .material-symbols-rounded { font-size: 46px; }
  .action-btn span { font-size: 26px; color: rgba(255,255,255,0.8); font-weight: 600; }

  /* Recommended Videos */
  .recommended-section {
    padding: 0 40px;
    margin-top: 10px;
  }
  .r-title {
    color: #fff; font-size: 32px; font-weight: 700; margin-bottom: 25px;
  }
  .r-item {
    display: flex; gap: 20px; align-items: flex-start;
  }
  .r-thumb {
    position: relative; width: 280px; height: 160px; border-radius: 12px; overflow: hidden;
  }
  .r-thumb img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .r-time {
    position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8);
    color: white; padding: 4px 10px; border-radius: 6px; font-size: 18px; font-weight: 600;
  }
  .r-info { flex: 1; }
  .r-vid-title {
    color: #fff; font-size: 26px; font-weight: 600; line-height: 1.3; margin-bottom: 12px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .r-vid-stats {
    color: rgba(255,255,255,0.5); font-size: 22px;
  }

  /* Incognito Overlay (Diagonal Split) */
  .incognito-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26, 26, 28, 0.96);
    backdrop-filter: blur(12px);
    clip-path: polygon(52% 0, 100% 0, 100% 100%, 35% 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    /* subtle left border shadow to simulate depth */
    box-shadow: inset 10px 0 20px rgba(0,0,0,0.5);
  }
  
  /* Drop shadow trick for clip-path */
  .incognito-shadow-wrapper {
    position: absolute;
    inset: 0;
    filter: drop-shadow(-10px 0px 20px rgba(0,0,0,0.6));
    pointer-events: none;
    z-index: 10;
  }

  .incognito-icon-wrapper {
    position: absolute;
    top: 50%;
    left: 75%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: auto;
  }

  /* Subtle diagonal split line */
  .split-line {
    position: absolute;
    top: -10%; left: 52%;
    width: 2px; height: 120%;
    background: linear-gradient(to bottom, rgba(255,140,0,0), rgba(255,140,0,0.5), rgba(255,140,0,0));
    transform-origin: top left;
    transform: rotate(10deg); /* matches polygon roughly */
    z-index: 10;
    opacity: 0.3;
  }

</style>
</head>
<body>
<div class="bg"></div>

<div class="headline">
  <span>Private</span> Browser
</div>

<div class="phone-container">
  
  <!-- Normal Layer -->
  <div class="screen-normal">
    <div class="browser-chrome">
      <span class="material-symbols-rounded b-home">home</span>
      <div class="b-url">
        <span class="material-symbols-rounded" style="font-size:28px;">lock</span>
        https://www.bestvideos.com/...
      </div>
    </div>
    
    <div class="site-hdr">
      <div class="s-logo">
        <div class="s-logo-box">BEST</div>
        <div class="s-logo-txt">VIDEOS</div>
      </div>
    </div>
    
    <div class="vid-area">
      <img src="woman1.png" alt="video thumbnail">
      <div class="vid-progress">
        <div class="vid-progress-fill"></div>
      </div>
    </div>
    
    <div class="vid-meta">
      <div class="v-title">Hot 🔥 Travel Vlog 🌍 Maldives 4K HDR</div>
      <div class="v-stats">1.2M views &nbsp;|&nbsp; 2 weeks ago</div>
      <div class="v-actions">
        <div class="action-btn">
          <span class="material-symbols-rounded">thumb_up</span>
          <span>45K</span>
        </div>
        <div class="action-btn">
          <span class="material-symbols-rounded">thumb_down</span>
          <span>12</span>
        </div>
      </div>
    </div>
    
    <div class="recommended-section">
      <div class="r-title">Recommended Videos</div>
      <div class="r-list">
        <div class="r-item">
          <div class="r-thumb">
            <img src="thumb_woman.png" alt="recommended video">
            <div class="r-time">10:45</div>
          </div>
          <div class="r-info">
            <div class="r-vid-title">Beautiful Japanese Model Photoshoot Behind The Scenes</div>
            <div class="r-vid-stats">850K views &nbsp;|&nbsp; 3 days ago</div>
          </div>
        </div>
      </div>
    </div>

  </div>
  
  <!-- Incognito Split Layer Wrapper for Shadow -->
  <div class="incognito-shadow-wrapper">
    <div class="incognito-overlay">
      <div class="incognito-icon-wrapper">
        <img src="incognito.png" width="220" style="filter: brightness(0) invert(1) drop-shadow(0 4px 10px rgba(0,0,0,0.5));" alt="Incognito Mode">
      </div>
    </div>
  </div>

</div>
</body>
</html>
