<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>XDownload – Play Store Screenshot One Click</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,700,1,0"
    rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@600;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #141112;
      font-family: 'Inter', sans-serif;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Background Glows */
    .bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 80% 60%, rgba(255, 140, 0, 0.15) 0%, transparent 60%),
        radial-gradient(circle at 20% 30%, rgba(100, 150, 255, 0.08) 0%, transparent 50%),
        linear-gradient(180deg, #1f1b24 0%, #120e10 100%);
    }

    /* Headline */
    .headline {
      position: absolute;
      top: 80px;
      left: 0;
      right: 0;
      z-index: 10;
      font-size: 105px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      text-align: center;
      letter-spacing: -2px;
      line-height: 1.1;
      text-shadow: 
        0 5px 15px rgba(0, 0, 0, 0.9), 
        -20px 25px 50px rgba(0, 0, 0, 0.8),
        20px 25px 50px rgba(0, 0, 0, 0.8),
        0 40px 70px rgba(0, 0, 0, 0.9);
      filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.7));
    }

    .headline-top {
      color: #ff8c00;
    }

    .headline-bottom {
      color: #fff;
    }

    /* Phone Mockup */
    .phone-container {
      z-index: 1;
      margin-top: 295px;
      width: 880px;
      height: 1850px;
      border-radius: 50px 50px 0 0;
      background: #111;
      border: 14px solid #282830;
      border-bottom: none;
      box-shadow:
        0 0 0 4px #3a3a48,
        0 40px 100px rgba(0, 0, 0, 0.9),
        0 0 80px rgba(255, 140, 0, 0.15);
      position: relative;
      overflow: hidden;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="headline">
    <div class="headline-top">One-click</div>
    <div class="headline-bottom">Download</div>
  </div>

  <div class="phone-container">
    <img src="oneclickdownload.png" class="phone-screen" alt="App One Click Download">
  </div>

</body>

</html>
