<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XDownload – Play Store Screenshot Safe</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,700,1,0" rel="stylesheet" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;600;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #141112;
    font-family: 'Inter', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Background Glows */
  .bg {
    position: absolute; inset: 0; z-index: 0;
    background: 
      radial-gradient(circle at 80% 60%, rgba(255, 140, 0, 0.15) 0%, transparent 60%),
      radial-gradient(circle at 20% 30%, rgba(100, 150, 255, 0.08) 0%, transparent 50%),
      linear-gradient(180deg, #1f1b24 0%, #120e10 100%);
  }

  /* Headline */
  .headline {
    z-index: 1;
    margin-top: 170px;
    font-size: 110px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    text-align: center;
    letter-spacing: -2px;
    text-shadow: 
      0 5px 15px rgba(0, 0, 0, 0.9), 
      -20px 25px 50px rgba(0, 0, 0, 0.8),
      20px 25px 50px rgba(0, 0, 0, 0.8),
      0 40px 70px rgba(0, 0, 0, 0.9);
    filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.7));
    color: #fff;
  }
  .headline span { color: #ff9900; }

  /* Phone Mockup */
  .phone-container {
    z-index: 1;
    margin-top: 100px;
    width: 900px;
    height: 1540px;
    border-radius: 60px 60px 0 0;
    background: #1f1f1f;
    border: 14px solid #282830;
    border-bottom: none;
    box-shadow: 
      0 0 0 4px #3a3a48,
      0 40px 100px rgba(0,0,0,0.9), 
      0 0 80px rgba(255,140,0,0.15);
    position: relative;
    overflow: hidden;
  }

  /* Phone UI */
  .app-header {
    height: 160px;
    background: #121212;
    display: flex;
    align-items: center;
    padding: 0 50px;
    gap: 40px;
  }
  .app-header .material-symbols-rounded {
    font-size: 55px;
    color: #fff;
  }
  .app-header h2 {
    font-size: 45px;
    color: #fff;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .pin-prompt {
    margin-top: 250px;
    text-align: center;
    color: #fff;
    font-size: 55px;
    font-weight: 500;
  }
  
  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 35px;
    margin-top: 70px;
  }
  .pin-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 15px rgba(255,255,255,0.4);
  }
  .pin-dot.empty {
    background: #4a4a4a;
    box-shadow: none;
  }

  .keypad {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 700px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    background: #151515;
  }
  .key {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 65px;
    color: #fff;
    font-weight: 400;
    user-select: none;
  }
  .key.active {
    background: #33333e;
  }
  .key .material-symbols-rounded {
    font-size: 65px;
    color: #aaa;
  }

  /* Shield Overlay */
  .shield-overlay {
    position: absolute;
    top: 290px;
    right: 40px;
    width: 220px;
    height: 260px;
    z-index: 10;
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6));
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .shield-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .shield-overlay .lock-icon {
    position: relative;
    font-size: 110px;
    color: #fff;
    z-index: 2;
    margin-top: -15px;
  }

  /* Hand Overlay */
  .hand-overlay {
    position: absolute;
    bottom: 360px;
    left: 220px;
    width: 340px;
    height: auto;
    z-index: 30;
    filter: drop-shadow(-15px 25px 25px rgba(0,0,0,0.7));
    transform: rotate(-25deg);
  }

</style>
</head>
<body>
<div class="bg"></div>

<div class="headline">
  Hide Your <span>Secrets</span>
</div>

<div class="phone-container">
  
  <div class="app-header">
    <span class="material-symbols-rounded">arrow_back</span>

  <div class="pin-dots">
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>

    <div class="pin-dot empty"></div>
  </div>

  <div class="keypad">
    <div class="key active">1</div>
    <div class="key">2</div>
    <div class="key">3</div>
    <div class="key">4</div>
    <div class="key">5</div>
    <div class="key">6</div>
    <div class="key">7</div>
    <div class="key">8</div>
    <div class="key">9</div>
    <div class="key"></div>
    <div class="key">0</div>
    <div class="key"><span class="material-symbols-rounded">backspace</span></div>
  </div>

</div>

<!-- Overlays -->
<div class="shield-overlay">
  <!-- Custom SVG Shield shape -->
  <svg viewBox="0 0 100 120" class="shield-svg">
    <path d="M50 0 C50 0 90 10 100 20 C100 60 90 90 50 120 C10 90 0 60 0 20 C10 10 50 0 50 0 Z" fill="#ff9900" />
  </svg>
  <span class="material-symbols-rounded lock-icon">lock</span>

<!-- Make sure you add hand.png to your directory! -->
<img src="hand.png" class="hand-overlay" alt="Hand Pointing">

</body>
</html>
