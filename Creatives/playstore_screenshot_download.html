<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XDownload – Play Store Screenshot Download Management</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,700,1,0" rel="stylesheet" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@600;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #141112;
    font-family: 'Inter', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Background Glows */
  .bg {
    position: absolute; inset: 0; z-index: 0;
    background: 
      radial-gradient(circle at 80% 60%, rgba(255, 140, 0, 0.15) 0%, transparent 60%),
      radial-gradient(circle at 20% 30%, rgba(100, 150, 255, 0.08) 0%, transparent 50%),
      linear-gradient(180deg, #1f1b24 0%, #120e10 100%);
  }

  /* Headline */
  .headline {
    z-index: 1;
    margin-top: 180px;
    font-size: 110px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    text-align: center;
    letter-spacing: -2px;
    line-height: 1.15;
    text-shadow: 
      0 5px 15px rgba(0, 0, 0, 0.9), 
      -20px 25px 50px rgba(0, 0, 0, 0.8),
      20px 25px 50px rgba(0, 0, 0, 0.8),
      0 40px 70px rgba(0, 0, 0, 0.9);
    filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.7));
  }
  .headline-top { color: #fff; }
  .headline-bottom { color: #ff8c00; }

  /* Phone Mockup */
  .phone-container {
    z-index: 1;
    margin-top: 47px;
    width: 900px;
    height: 1540px; /* Give it more height to reach the bottom */
    border-radius: 60px 60px 0 0;
    background: #fff; /* White background behind the screenshot in case of transparency */
    border: 14px solid #282830;
    border-bottom: none;
    box-shadow: 
      0 0 0 4px #3a3a48,
      0 40px 100px rgba(0,0,0,0.9), 
      0 0 80px rgba(255,140,0,0.15);
    position: relative;
    overflow: hidden;
  }
  
  .phone-screen {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  /* CSS rocket */
  .rocket {
    position: relative;
    width: 250px;
    transform: translateY(-15px) rotate(20deg);
  }

  .rocket-body {
    width: 120px; height: 240px;
    background: linear-gradient(180deg, #f0f0f0 0%, #c8c8c8 100%);
    border-radius: 50% 50% 20% 20% / 60% 60% 20% 20%;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .rocket-window {
    position: absolute;
    top: 66px; left: 50%; transform: translateX(-50%);
    width: 48px; height: 48px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #7bd4ff, #0066cc);
    border: 4px solid rgba(0,0,0,0.15);
    box-shadow: 0 0 10px rgba(100,200,255,0.4);
  }
  .rocket-stripe {
    position: absolute;
    bottom: 42px; left: 0; right: 0; height: 15px;
    background: #ff8c00;
  }
  .rocket-fin-l, .rocket-fin-r {
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
  }
  .rocket-fin-l {
    left: -33px;
    border-right: 33px solid #c8c8c8;
    border-top: 75px solid transparent;
  }
  .rocket-fin-r {
    right: -33px;
    border-left: 33px solid #c8c8c8;
    border-top: 75px solid transparent;
  }
  /* flame */
  .rocket-flame {
    position: absolute;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px; height: 140px;
    z-index: -1;
  }
  .flame-blast {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%) scale(1.2);
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,100,0,0.9) 0%, rgba(255,50,0,0.4) 40%, transparent 70%);
    filter: blur(10px);
    mix-blend-mode: screen;
  }
  .flame-inner {
    position: absolute;
    top: -10px; left: 50%; transform: translateX(-50%) scale(1.2, 1.15);
    width: 60px; height: 120px;
    background: linear-gradient(to bottom, #ffffff 0%, #ffff66 20%, #ffaa00 60%, #ff2200 100%);
    clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
    filter: blur(3px);
  }
  .flame-outer {
    position: absolute;
    top: -20px; left: 50%; transform: translateX(-50%) scale(1.2, 1.15);
    width: 100px; height: 140px;
    background: linear-gradient(to bottom, #ffaa00 0%, #ff2200 50%, transparent 100%);
    clip-path: polygon(10% 0%, 90% 0%, 50% 100%);
    filter: blur(8px);
    opacity: 0.9;
  }

  .floating-rocket {
    position: absolute;
    right: 50px;
    bottom: 120px;
    z-index: 50;
    transform: scale(1.1);
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
  }

</style>
</head>
<body>
<div class="bg"></div>

<div class="headline">
  <div class="headline-top">Download</div>
  <div class="headline-bottom">Management</div>
</div>

<div class="phone-container">
  <img src="Download_Tab.png" class="phone-screen" alt="App Download Tab">
</div>

<!-- CSS Rocket -->
<div class="floating-rocket">
  <div class="rocket">
    <div class="rocket-flame">
      <div class="flame-blast"></div>
      <div class="flame-outer"></div>
      <div class="flame-inner"></div>
    </div>
    <div class="rocket-body">
      <div class="rocket-fin-l"></div>
      <div class="rocket-fin-r"></div>
      <div class="rocket-stripe"></div>
      <div class="rocket-window"></div>
    </div>
  </div>
</div>

</body>
</html>
